name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: darwin/universal
            artifact: TryNet.app
            compress: tar.gz
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            artifact: TryNet.exe
            compress: zip
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            artifact: TryNet
            compress: tar.gz

    runs-on: ${{ matrix.os }}
    name: Build for ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # macOS 依赖
      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          echo "macOS 已包含所需工具"

      # Linux 依赖
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      # Windows 依赖
      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        run: |
          echo "Windows 已包含所需工具"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build application
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -tags webkit2_41
          else
            wails build -platform ${{ matrix.platform }}
          fi
        shell: bash

      # macOS 特殊处理：移除隔离属性并打包
      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          xattr -cr TryNet.app
          tar -czf TryNet-macOS-universal.tar.gz TryNet.app

      # Windows 打包
      - name: Package Windows app
        if: matrix.os == 'windows-latest'
        run: |
          cd build/bin
          Compress-Archive -Path TryNet.exe -DestinationPath TryNet-Windows-amd64.zip

      # Linux 打包
      - name: Package Linux app
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/bin
          tar -czf TryNet-Linux-amd64.tar.gz TryNet

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            build/bin/*.tar.gz
            build/bin/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
